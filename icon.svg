<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="personGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background Circle with Gradient -->
  <rect width="128" height="128" rx="24" fill="url(#bgGradient)"/>
  
  <!-- Connection Lines -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round">
    <line x1="64" y1="36" x2="36" y2="72"/>
    <line x1="64" y1="36" x2="92" y2="72"/>
    <line x1="36" y1="72" x2="92" y2="72"/>
    <line x1="64" y1="36" x2="64" y2="90"/>
  </g>
  
  <!-- Connection Nodes -->
  <circle cx="64" cy="36" r="6" fill="white"/>
  <circle cx="36" cy="72" r="6" fill="white"/>
  <circle cx="92" cy="72" r="6" fill="white"/>
  <circle cx="64" cy="90" r="6" fill="white"/>
  
  <!-- Top Person -->
  <g transform="translate(64, 28)">
    <circle cx="0" cy="-12" r="10" fill="url(#personGradient)"/>
    <path d="M-12 8 Q0 -4 12 8 L12 16 Q0 8 -12 16 Z" fill="url(#personGradient)"/>
  </g>
  
  <!-- Left Person -->
  <g transform="translate(28, 72)">
    <circle cx="0" cy="-12" r="10" fill="url(#personGradient)"/>
    <path d="M-12 8 Q0 -4 12 8 L12 16 Q0 8 -12 16 Z" fill="url(#personGradient)"/>
  </g>
  
  <!-- Right Person -->
  <g transform="translate(100, 72)">
    <circle cx="0" cy="-12" r="10" fill="url(#personGradient)"/>
    <path d="M-12 8 Q0 -4 12 8 L12 16 Q0 8 -12 16 Z" fill="url(#personGradient)"/>
  </g>
  
  <!-- Bottom Person -->
  <g transform="translate(64, 98)">
    <circle cx="0" cy="-12" r="10" fill="url(#personGradient)"/>
    <path d="M-12 8 Q0 -4 12 8 L12 16 Q0 8 -12 16 Z" fill="url(#personGradient)"/>
  </g>
  
  <!-- Center Collaboration Symbol -->
  <circle cx="64" cy="64" r="8" fill="white" opacity="0.9"/>
  <circle cx="64" cy="64" r="4" fill="url(#bgGradient)"/>
</svg>
